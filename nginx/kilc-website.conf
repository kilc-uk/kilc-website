# www → apex redirect (dedicated block avoids "if is evil" in SSL context)
server {
    listen 443 ssl;
    http2 on;
    server_name www.kilc.co.uk;

    ssl_certificate     /etc/nginx/certs/kilc-origin.pem;
    ssl_certificate_key /etc/nginx/certs/kilc-origin-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL_kilc:10m;
    ssl_session_timeout 10m;

    return 301 https://kilc.co.uk$request_uri;
}

# Main site
server {
    listen 443 ssl;
    http2 on;
    server_name kilc.co.uk;

    ssl_certificate     /etc/nginx/certs/kilc-origin.pem;
    ssl_certificate_key /etc/nginx/certs/kilc-origin-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL_kilc:10m;
    ssl_session_timeout 10m;

    # Cloudflare real IP restoration
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    root /usr/share/nginx/html/kilc-website;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Static assets with long cache
    location ~* \.(css|js|jpg|jpeg|png|webp|svg|woff2|ico)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Clean URLs (Astro static output)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
}

# HTTP → HTTPS redirect (Cloudflare handles this, but belt-and-suspenders)
server {
    listen 80;
    server_name kilc.co.uk www.kilc.co.uk;
    return 301 https://kilc.co.uk$request_uri;
}
